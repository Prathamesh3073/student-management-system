<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Dashboard</h2>

<a href="/add" class="btn btn-primary mb-3">Add Student</a>

<table class="table table-bordered">
<tr>
<th>Name</th>
<th>Course</th>
<th>Total</th>
<th>Paid</th>
<th>Remaining</th>
<th>Action</th>
</tr>

{% for row in data %}
<tr>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[3]-row[4]}}</td>

<td>
<a href="/edit/{{row[0]}}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{row[0]}}" class="btn btn-danger btn-sm">Delete</a>

{% if row[4] < row[3] %}
<a href="/pay/{{row[0]}}" class="btn btn-success btn-sm">Pay</a>
{% endif %}

<a href="/invoice/{{row[0]}}" class="btn btn-info btn-sm">Invoice</a>
</td>
</tr>
{% endfor %}

</table>

</body>
</html>
