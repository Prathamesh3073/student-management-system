<!DOCTYPE html>
<html>
<head>
<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h3 class="text-center mb-4">✏️ Edit Student</h3>

<form method="POST" class="card p-4 shadow">

<input type="text" name="name" class="form-control mb-3" value="{{student[1]}}" required>

<input type="text" name="course" class="form-control mb-3" value="{{student[2]}}" required>

<input type="number" name="total" class="form-control mb-3" value="{{student[3]}}" required>

<input type="number" name="paid" class="form-control mb-3" value="{{student[4]}}" required>

<button class="btn btn-primary">Update</button>

</form>

</div>

</body>
</html>
