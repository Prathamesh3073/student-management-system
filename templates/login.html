<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EduTrack Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background:#07111f;
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* BACKGROUND GLOW */
.glow{
    position:absolute;
    width:450px;
    height:450px;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.25;
    pointer-events:none;
}

.glow1{
    background:#2563eb;
    top:-150px;
    left:-100px;
}

.glow2{
    background:#9333ea;
    bottom:-150px;
    right:-100px;
}

/* LOGIN CARD */
.login-card{
    width:420px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;
    padding:45px;
    color:white;
    position:relative;
    z-index:10;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo i{
    font-size:55px;
    color:#7dd3fc;
    margin-bottom:15px;
}

.logo h1{
    font-size:34px;
    font-weight:700;
}

.logo p{
    color:#94a3b8;
}

/* INPUTS */
.form-control{
    background:rgba(255,255,255,0.06);
    border:none;
    color:white;
    padding:15px;
    border-radius:14px;
    margin-bottom:20px;
}

.form-control:focus{
    background:rgba(255,255,255,0.08);
    color:white;
    box-shadow:none;
    border:1px solid #38bdf8;
}

.form-control::placeholder{
    color:#cbd5e1;
}

/* BUTTON */
.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#0ea5e9,#6366f1);
    color:white;
    font-size:18px;
    font-weight:700;
    transition:0.3s;
}

.login-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(14,165,233,0.35);
}

/* SIGNUP */
.signup{
    margin-top:25px;
    text-align:center;
    color:#94a3b8;
}

.signup a{
    color:#7dd3fc;
    text-decoration:none;
    font-weight:600;
}

</style>
</head>

<body>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="login-card">

    <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <h1>EduTrack</h1>
        <p>Premium Student Management Platform</p>
    </div>

    <form method="POST">

        <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Password"
            required
        >

        <button class="login-btn">
            Login
        </button>

    </form>

    <div class="signup">
        Don’t have an account?
        <a href="/signup">Create Account</a>
    </div>

</div>

</body>
</html>
