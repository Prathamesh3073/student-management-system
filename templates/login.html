<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height:100vh;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card {
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:350px;
    color:white;
}
</style>

</head>

<body>

<div class="card">

<h4 class="text-center">EduTrack Login</h4>

<form method="POST">

<input type="text" name="username" class="form-control mb-3" placeholder="Username" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-primary w-100">Login</button>

<a href="/signup" class="btn btn-outline-light w-100 mt-2">Create Account</a>

</form>

</div>

</body>
</html>
