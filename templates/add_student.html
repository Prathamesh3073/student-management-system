<!DOCTYPE html>
<html>
<head>
<title>Add Student</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(to right, #4facfe, #00f2fe);
        min-height: 100vh;
    }
</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">

<div class="col-md-6">

<div class="card shadow p-4">

<h3 class="text-center mb-4">➕ Add Student</h3>

<form method="POST">

<input type="text" name="name" class="form-control mb-3" placeholder="Student Name" required>

<input type="text" name="course" class="form-control mb-3" placeholder="Course" required>

<input type="number" name="total" class="form-control mb-3" placeholder="Total Fees" required>

<input type="number" name="paid" class="form-control mb-3" placeholder="Paid Fees" required>

<button class="btn btn-success w-100">Add Student</button>

<a href="/dashboard" class="btn btn-secondary mt-2 w-100">Back</a>

</form>

</div>

</div>

</div>

</body>
</html>
